name: Deploy static site to GH pages

on:
  push:
    branches: ['master']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup pages
        uses: actions/configure-pages@v6
      - name: Upload
        uses: actions/upload-pages-artifact@v4
        with:
            path: './dist'
      - name: Deployment to pages
        id: 'deployment'
        uses: actions/deploy-pages@v4
